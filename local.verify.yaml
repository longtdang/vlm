            structural landmark for a '{label}' (arm joint, hub, contact pad, etc.).
            A dot is WRONG if it sits on: empty background, a roll instead of the clamp structure,
            a text sticker, or clearly the wrong part of the object.
            Scoring guide:
              0.0–0.2 = all dots are on plausible structural positions for a '{label}'
              0.2–0.5 = one dot looks slightly misplaced but roughly in the right area
              0.5–1.0 = one or more dots are clearly on the wrong location
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all keypoints on plausible structural positions"}
          occlusion_state: |
            You are checking visibility labels for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it.
            Dot color rules (STRICT):
              GREEN dot  = the physical surface at that exact position IS directly visible to the camera.
                           Nothing is in front of it blocking your view.
              ORANGE dot = the physical surface at that position IS BLOCKED by another object
                           (e.g. a roll, a wall, another clamp) — you cannot see through to that surface.
              GRAY dot   = unlabeled, skip.
            Your task: for each GREEN or ORANGE dot, decide if its color is correct.
              - GREEN dot on a surface that is BLOCKED (hidden behind a roll or object) → WRONG
              - ORANGE dot on a surface that is DIRECTLY VISIBLE (nothing in front) → WRONG
              - DOMAIN RULE: if a GREEN dot appears to sit ON TOP OF a cylindrical roll
                (the dot is on the roll's surface), the clamp arm at that position is behind
                the roll → it MUST be orange. A green dot ON a roll surface is always WRONG.
            Check every dot individually. Even ONE clearly wrong dot color scores 0.5 or higher.
            Scoring guide:
              0.0–0.2 = all green/orange dots correctly reflect visible vs hidden
              0.2–0.5 = one dot's visibility is uncertain or borderline
              0.5–1.0 = one or more dots have clearly the wrong color
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all dot colors match actual visibility"}
      roll-keypoints:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it
            showing its name. Do NOT confuse these dots with text, stickers, or printed labels in scene.
            Dot colors: green = visible, orange = occluded (hidden behind another object), gray = unlabeled.
            Note: orange dots may appear ON other objects — this is intentional and CORRECT.
            For each dot: ignore its color. Only judge whether the dot's POSITION is on a plausible
            structural landmark for a '{label}' (roll edge, center, end cap, etc.).
            A dot is WRONG if it sits on: empty background, a non-roll structure,
            a text sticker, or clearly the wrong part of the object.
            Scoring guide:
              0.0–0.2 = all dots are on plausible structural positions for a '{label}'
              0.2–0.5 = one dot looks slightly misplaced but roughly in the right area
              0.5–1.0 = one or more dots are clearly on the wrong location
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all keypoints on plausible structural positions"}
          occlusion_state: |
            You are checking visibility labels for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it.
            Dot color rules (STRICT):
              GREEN dot  = the physical surface at that exact position IS directly visible to the camera.
                           Nothing is in front of it blocking your view.
              ORANGE dot = the physical surface at that position IS BLOCKED by another object
                           — you cannot see through to that surface.
              GRAY dot   = unlabeled, skip.
            Your task: for each GREEN or ORANGE dot, decide if its color is correct.
              - GREEN dot on a surface that is BLOCKED (hidden behind another object) → WRONG
              - ORANGE dot on a surface that is DIRECTLY VISIBLE (nothing in front) → WRONG
            Check every dot individually. Even ONE clearly wrong dot color scores 0.5 or higher.
            Scoring guide:
              0.0–0.2 = all green/orange dots correctly reflect visible vs hidden
              0.2–0.5 = one dot's visibility is uncertain or borderline
