# Local filesystem paths only. Relative paths are resolved from this file's directory.
image_dir: ./data/images
datumaro_json: ./data/datumaro.json
dataset_name: cvat_pose_dataset
label_field: ground_truth

verification:
  output_dir: ./verification-runs
  image_dir: ./data/images        # optional: overrides top-level image_dir for verify only
  deterministic:
    padding_px: 25                # pixels of padding added around each crop
    rules:
      global:
        # --- detection (applies to ALL annotation types) ---
        detection:
          - bbox_format           # always keep — ensures geometry is valid before other checks
          - bbox_non_empty        # catches zero-size boxes

        # --- attribute checks ---
        attribute:
          []
          # Uncomment to also check roll_count and clamp_type values:
          # - roll_count_positive
          # - name: clamp_type_allowed
          #   params:
          #     allowed: ["2-arm", "3-arm"]

        # --- keypoint count ---
        # Set [] here and use per-label overrides when skeletons have different counts.
        # Set a single expected value here only if ALL labels share the same count.
        skeleton-count:
          []

        # --- visibility codes ---
        visibility-format:
          - visibility_codes      # checks 0/1/2 only
          - out_of_frame_occluded # out-of-frame keypoints must be marked occluded (v=1)

      # Per-label overrides — any category omitted inherits from global above.
      # Remove or add label blocks as needed.
      overrides:
        # Example: different skeleton types with different keypoint counts
        clamp-2-arm:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 12
        clamp-3-arm:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 16
        roll-keypoints:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 4
        # Polygon labels — disable skeleton-count (variable point count)
        # clamp-mask:
        #   skeleton-count: []
        # roll-mask:
        #   skeleton-count: []

  vlm:
    enabled: true
    model_name: qwen3-vl-2b-instruct-torch
    # model_name: Qwen/Qwen2.5-VL-3B-Instruct
    # zoo_model_source: https://github.com/harpreetsahota204/qwen2_5_vl
    # Built-in zoo models (no zoo_model_source needed):
    #   qwen3-vl-2b-instruct-torch
    #   qwen3-vl-4b-instruct-torch
    #   qwen3-vl-8b-instruct-torch
    thresholds:
      pass_below: 0.20            # risk ≤ 0.20 → PASS
      review_below: 0.60          # risk ≤ 0.60 → REVIEW, above → FAIL
    generation:
      max_new_tokens: 256
      timeout_seconds: 300.0       # increased for local CPU/GPU inference; low values force REVIEW via adapter_timeout
      batch_size: 2               # increase to 4–16 for higher GPU utilization (monitor VRAM)

    # DEFAULT PROMPT TEMPLATE
    # ─────────────────────────
    # This template is used for every rule unless overridden per label below.
    # Three variables are substituted at runtime:
    #   {label}                  — annotation label name (e.g. "forklift-with-roll")
    #   {rule}                   — rule name being evaluated (e.g. "clamp_type")
    #   {annotation_fields_json} — JSON of relevant annotation fields for this rule:
    #                              bbox_localization → {} (bbox drawn on image)
    #                              bbox_coverage     → {} (bbox drawn on image)
    #                              clamp_type        → {"attributes": {...}}
    #                              roll_count        → {"attributes": {...}}
    #                              keypoint_position → {} (keypoints drawn on image)
    #                              occlusion_state   → {} (keypoints drawn on image)
    #
    # NOTE: The image shown to the VLM is an annotated crop with the annotation
    # overlaid directly on the pixels:
    #   - Bounding box: orange-red rectangle outline
    #   - Keypoints: colored dots — green (visible), orange (occluded), gray (unlabeled)
    #                plus a small white text label above each dot showing its anatomical name
    # Vision rules (bbox_*, keypoint_*, occlusion_*) use the drawn overlay;
    # attribute rules (clamp_type, roll_count) also receive a JSON payload.
    #
    # The model MUST return strict JSON:
    #   {"error_probability": <float 0–1>, "reason": "<brief reason>"}
    # Optional "evidence" field is also captured if returned.
    #
    # Override template used for all labels/rules (unless per-rule prompt override is set below):
    default_prompt_template: |
      You are verifying annotation quality for label '{label}' and rule '{rule}'.
      The image shows a crop that may contain multiple objects. The annotation being
      evaluated is drawn directly on the image — focus ONLY on the marked annotation.
      {annotation_fields_json}
      Return ONLY strict JSON, with no markdown and no prose:
      {"error_probability": <float between 0 and 1>, "reason": "<brief reason>"}

    labels:
      # VLM RULES (available rules for all labels):
      #   bbox_localization  — is the bounding box tightly localizing the object?
      #   bbox_coverage      — does the bbox cover the full object without major clipping?
      #   clamp_type         — is the labeled clamp type (2-arm / 3-arm) visually correct?
      #   roll_count         — does the roll count attribute match what is visible?
      #   keypoint_position  — are keypoints placed correctly on the object?
      #   occlusion_state    — do visibility codes correctly reflect occlusion?
      #
      # Rule selection by annotation type:
      #   bbox labels (forklift-*): bbox_localization, bbox_coverage, attribute rules
      #   skeleton labels (clamp-*-arm, roll-keypoints): keypoint_position, occlusion_state
      #     → bbox_localization/bbox_coverage are NOT used for skeletons because the bbox
      #       is auto-derived from keypoint coordinates — there is no manually-placed bbox
      #       to evaluate for localization or coverage quality.
      #   mask/polygon labels (clamp-mask, roll-mask): no applicable rules currently;
      #     the 6 VLM rules require either a manually-placed bbox or keypoints.
      #
      # Add one block per label that should be VLM-checked.
      # Only deterministic-PASS objects for enabled labels reach the VLM stage.
      forklift-with-roll:
        enabled: true
        # bbox type: manually-placed bbox + clamp-type + roll-count attributes
        rules: ["bbox_localization", "bbox_coverage", "clamp_type", "roll_count"]
        # Per-rule prompt overrides — use {label}, {rule}, {annotation_fields_json}.
        prompts:
          bbox_localization: |
            This crop shows one annotated object for label '{label}'.
            An orange-red rectangle is drawn on the image — that is the bounding box being evaluated.
            Question: Is the orange-red box placed on the CORRECT type of object — a '{label}' —
            and NOT on empty background, a roll alone, or a completely different object type?
            Do NOT judge whether the box is tight or loose here. Only judge object identity.
            Scoring guide:
              0.0–0.2 = the box is clearly on a correct '{label}' object
              0.2–0.6 = the box is on the right object but placement is ambiguous or partially off
              0.6–1.0 = the box is on the wrong object type, or mostly on empty background
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "box is on the correct forklift"}
          bbox_coverage: |
            This crop shows one annotated object for label '{label}'.
            An orange-red rectangle is drawn on the image — that is the bounding box being evaluated.
            Question: Does the orange-red box TIGHTLY enclose the '{label}'?
            A tight box has its edges close to the true object boundary, with no large empty space
            inside and no significant part of the object cut off.
            IMPORTANT: A box that is 1.5x or more the object's visual size — with large empty regions
            inside — is a HIGH error even if the object is technically inside it.
            Scoring guide:
              0.0–0.2 = box tightly covers the full object, edges close to object boundary
              0.2–0.6 = box is slightly loose or a small part of the object is clipped
              0.6–1.0 = box is much larger than the object (lots of empty space inside), OR
                        a significant part of the object extends outside the box
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "box tightly covers the full forklift"}
          clamp_type: |
            Annotation data: {annotation_fields_json}
            The annotation above states the clamp type for label '{label}'.
            A "2-arm" clamp has exactly 2 gripping arms extending from its central hub.
            A "3-arm" clamp has exactly 3 gripping arms extending from its central hub.
            Step 1: Look at the clamp attached to the forklift inside the orange-red bounding box.
            Step 2: Count the number of distinct gripping arms extending from the central hub.
            Step 3: Compare your arm count to the stated type ("2-arm" = 2, "3-arm" = 3).
            IMPORTANT: If your count clearly does NOT match the stated type, score 0.7 or higher.
            If the clamp is too occluded to count arms reliably, score 0.5 — never guess PASS.
            Scoring guide:
              0.0–0.2 = your arm count clearly matches the stated type
              0.2–0.5 = clamp is partially occluded, arm count is uncertain
              0.6–1.0 = your arm count clearly does NOT match the stated type
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "counted 2 arms, matches stated 2-arm type"}
          roll_count: |
            Annotation data: {annotation_fields_json}
            The annotation above states the number of rolls the '{label}' is carrying.
            Step 1: Look inside the orange-red bounding box.
            Step 2: Count the visible cylindrical rolls that the forklift is carrying or holding.
            Step 3: Compare your count to the stated number.
            IMPORTANT: If your count clearly does NOT match the stated number, score 0.7 or higher.
            If rolls are too occluded to count reliably, score 0.5 — never guess PASS.
            Scoring guide:
              0.0–0.2 = your roll count clearly matches the stated number
              0.2–0.5 = partially occluded, roll count is uncertain
              0.6–1.0 = your roll count clearly does NOT match the stated number
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "counted 2 rolls, matches stated count"}
        # Per-label thresholds (optional — inherits global when absent):
        # thresholds:
        #   pass_below: 0.15
        #   review_below: 0.50
      forklift-no-roll:
        enabled: true
        # bbox type: manually-placed bbox only (no roll/clamp attributes to validate)
        rules: ["bbox_localization", "bbox_coverage"]
        prompts:
          bbox_localization: |
            This crop shows one annotated object for label '{label}'.
            An orange-red rectangle is drawn on the image — that is the bounding box being evaluated.
            Question: Is the orange-red box placed on the CORRECT type of object — a '{label}' —
            and NOT on empty background or a completely different object type?
            Do NOT judge whether the box is tight or loose here. Only judge object identity.
            Scoring guide:
              0.0–0.2 = the box is clearly on a correct '{label}' object
              0.2–0.6 = the box is on the right object but placement is ambiguous or partially off
              0.6–1.0 = the box is on the wrong object type, or mostly on empty background
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "box is on the correct forklift"}
          bbox_coverage: |
            This crop shows one annotated object for label '{label}'.
            An orange-red rectangle is drawn on the image — that is the bounding box being evaluated.
            Question: Does the orange-red box TIGHTLY enclose the '{label}'?
            A tight box has its edges close to the true object boundary, with no large empty space
            inside and no significant part of the object cut off.
            IMPORTANT: A box that is 1.5x or more the object's visual size — with large empty regions
            inside — is a HIGH error even if the object is technically inside it.
            Scoring guide:
              0.0–0.2 = box tightly covers the full object, edges close to object boundary
              0.2–0.6 = box is slightly loose or a small part of the object is clipped
              0.6–1.0 = box is much larger than the object (lots of empty space inside), OR
                        a significant part of the object extends outside the box
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "box tightly covers the full forklift"}
      clamp-2-arm:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it
            showing its name. Do NOT confuse these dots with text, stickers, or printed labels in scene.
            Dot colors: green = visible, orange = occluded (hidden behind another object), gray = unlabeled.
            Note: orange dots may appear ON rolls or occluding objects — this is intentional and CORRECT.
            For each dot: ignore its color. Only judge whether the dot's POSITION is on a plausible
            structural landmark for a '{label}' (arm joint, hub, contact pad, etc.).
            A dot is WRONG if it sits on: empty background, a roll instead of the clamp structure,
            a text sticker, or clearly the wrong part of the object.
            Scoring guide:
              0.0–0.2 = all dots are on plausible structural positions for a '{label}'
              0.2–0.5 = one dot looks slightly misplaced but roughly in the right area
              0.5–1.0 = one or more dots are clearly on the wrong location
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all keypoints on plausible structural positions"}
          occlusion_state: |
            You are checking visibility labels for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it.
            Dot color rules (STRICT):
              GREEN dot  = the physical surface at that exact position IS directly visible to the camera.
                           Nothing is in front of it blocking your view.
              ORANGE dot = the physical surface at that position IS BLOCKED by another object
                           (e.g. a roll, a wall, another clamp) — you cannot see through to that surface.
              GRAY dot   = unlabeled, skip.
            Your task: for each GREEN or ORANGE dot, decide if its color is correct.
              - GREEN dot on a surface that is BLOCKED (hidden behind a roll or object) → WRONG
              - ORANGE dot on a surface that is DIRECTLY VISIBLE (nothing in front) → WRONG
              - DOMAIN RULE: if a GREEN dot appears to sit ON TOP OF a cylindrical roll
                (the dot is on the roll's surface), the clamp arm at that position is behind
                the roll → it MUST be orange. A green dot ON a roll surface is always WRONG.
            Check every dot individually. Even ONE clearly wrong dot color scores 0.5 or higher.
            Scoring guide:
              0.0–0.2 = all green/orange dots correctly reflect visible vs hidden
              0.2–0.5 = one dot's visibility is uncertain or borderline
              0.5–1.0 = one or more dots have clearly the wrong color
            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all dot colors match actual visibility"}
      clamp-3-arm:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            Colored dots mark structural keypoints. Each dot has a small white text label above it
            showing its name. Do NOT confuse these dots with text, stickers, or printed labels in scene.
