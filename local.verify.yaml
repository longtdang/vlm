            Return ONLY this JSON (no markdown, no prose). Keep "reason" under 15 words.
            {"error_probability": 0.05, "reason": "all dot colors match actual visibility"}
      # mask/polygon labels — none of the 6 VLM rules apply (no manually-placed bbox,
      # no keypoints, no relevant attributes in the annotation payload).
      clamp-mask:
        enabled: false
      roll-mask:
        enabled: false

