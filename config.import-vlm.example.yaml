# Import + deterministic + VLM verification (model-zoo only)
# Copy to local.import-vlm.yaml and edit paths + labels/rules.
image_dir: ./data/images
datumaro_json: ./data/annotations/datumaro.json
dataset_name: cvat_pose_dataset
label_field: ground_truth

verification:
  output_dir: ./verification-runs
  deterministic:
    padding_px: 16
    rules:
      global:
        detection: ["bbox_format"]
        attribute: ["required_attributes"]
        skeleton-count: ["keypoint_count"]
        visibility-format: ["visibility_codes"]
  vlm:
    enabled: true
    model_name: qwen3-vl-2b-instruct-torch
    thresholds:
      pass_below: 0.20
      review_below: 0.60
    generation:
      max_new_tokens: 256
      timeout_seconds: 8.0
    labels:
      forklift:
        enabled: true
        rules: ["bbox_localization", "bbox_coverage", "clamp_type"]
