# Import + deterministic + VLM verification (model-zoo only)
# Copy to local.verify.yaml and edit paths + labels/rules.
#
# RULES QUICK REFERENCE
# ─────────────────────
# category: detection
#   bbox_format        — bbox exists and has 4 numeric values
#                        (auto-derived from polygon/skeleton/points when bbox field absent)
#   bbox_non_empty     — width > 0 AND height > 0
#
# category: attribute
#   required_attributes  params: {required: [<key>, ...]}
#                        — every listed key exists in annotation.attributes
#   roll_count_positive  — attributes.roll_count is numeric and > 0
#   clamp_type_allowed   params: {allowed: ["2-arm", "3-arm"]}  (default shown)
#                        — attributes.clamp_type is one of the allowed values
#
# category: skeleton-count
#   keypoint_count     params: {expected: <int>}  ← REQUIRED
#                      — keypoint count exactly matches expected
#                      — set skeleton-count: [] globally and override per label
#                        when different skeletons have different point counts
#
# category: visibility-format
#   visibility_codes       — every visibility value is 0 (unlabeled), 1 (occluded), or 2 (visible)
#   out_of_frame_occluded  — any keypoint outside the original image frame must have visibility=1
#
# FAIL REASONS (appear in deterministic_report.csv/json)
# ───────────────────────────────────────────────────────
#   invalid_bbox                         bbox_non_empty failed
#   missing_required_attribute:<key>     required_attributes failed
#   missing_roll_count                   roll_count_positive: field absent
#   roll_count_non_positive              roll_count_positive: value ≤ 0
#   invalid_clamp_type:<value>           clamp_type_allowed: value not in allowed list
#   keypoint_count_mismatch:<a>!=<e>     keypoint_count: actual ≠ expected
#   invalid_visibility_codes             visibility_codes: value outside {0,1,2}
#   out_of_frame_points_visible:[<idx>]  out_of_frame_occluded: listed indices marked v=2

image_dir: ./data/images          # also accepted at top level (shared with import command)
datumaro_json: ./data/datumaro.json
dataset_name: cvat_pose_dataset
label_field: ground_truth

verification:
  output_dir: ./verification-runs
  image_dir: ./data/images        # optional: overrides top-level image_dir for verify only
  deterministic:
    padding_px: 16                # pixels of padding added around each crop
    rules:
      global:
        # --- detection (applies to ALL annotation types) ---
        detection:
          - bbox_format           # always keep — ensures geometry is valid before other checks
          - bbox_non_empty        # catches zero-size boxes

        # --- attribute checks ---
        attribute:
          - name: required_attributes
            params:
              required: [clamp_type]    # list every attribute key that must be present
          # Uncomment to also check roll_count and clamp_type values:
          # - roll_count_positive
          # - name: clamp_type_allowed
          #   params:
          #     allowed: ["2-arm", "3-arm"]

        # --- keypoint count ---
        # Set [] here and use per-label overrides when skeletons have different counts.
        # Set a single expected value here only if ALL labels share the same count.
        skeleton-count:
          - name: keypoint_count
            params:
              expected: 4         # ← change or move to per-label overrides below

        # --- visibility codes ---
        visibility-format:
          - visibility_codes      # checks 0/1/2 only
          - out_of_frame_occluded # out-of-frame keypoints must be marked occluded (v=1)

      # Per-label overrides — any category omitted inherits from global above.
      # Remove or add label blocks as needed.
      overrides:
        # Example: different skeleton types with different keypoint counts
        clamp-2-arm:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 12
        clamp-3-arm:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 16
        roll-keypoints:
          skeleton-count:
            - name: keypoint_count
              params:
                expected: 4
        # Polygon labels — disable skeleton-count (variable point count)
        # clamp-mask:
        #   skeleton-count: []
        # roll-mask:
        #   skeleton-count: []

  vlm:
    enabled: true
    model_name: qwen3-vl-2b-instruct-torch   # or qwen3-vl-4b-instruct-torch / qwen3-vl-8b-instruct-torch
    thresholds:
      pass_below: 0.20            # risk ≤ 0.20 → PASS
      review_below: 0.60          # risk ≤ 0.60 → REVIEW, above → FAIL
    generation:
      max_new_tokens: 256
      timeout_seconds: 8.0        # per-batch timeout; exceeded → REVIEW with adapter_timeout reason
      batch_size: 1               # objects per generate() call; increase (e.g. 4–16) for higher GPU utilization

    # DEFAULT PROMPT TEMPLATE
    # ─────────────────────────
    # This template is used for every rule unless overridden per label below.
    # Three variables are substituted at runtime:
    #   {label}                  — annotation label name (e.g. "forklift-with-roll")
    #   {rule}                   — rule name being evaluated (e.g. "clamp_type")
    #   {annotation_fields_json} — JSON of relevant annotation fields for this rule:
    #                              bbox_localization → {} (bbox drawn on image)
    #                              bbox_coverage     → {} (bbox drawn on image)
    #                              clamp_type        → {"attributes": {...}}
    #                              roll_count        → {"attributes": {...}}
    #                              keypoint_position → {} (keypoints drawn on image)
    #                              occlusion_state   → {} (keypoints drawn on image)
    #
    # NOTE: The image shown to the VLM is an annotated crop with the annotation
    # overlaid directly on the pixels:
    #   - Bounding box: orange-red rectangle outline
    #   - Keypoints: colored dots — green (visible), orange (occluded), gray (unlabeled)
    # Vision rules (bbox_*, keypoint_*, occlusion_*) use the drawn overlay;
    # attribute rules (clamp_type, roll_count) also receive a JSON payload.
    #
    # The model MUST return strict JSON:
    #   {"error_probability": <float 0–1>, "reason": "<brief reason>"}
    # Optional "evidence" field is also captured if returned.
    #
    # Override template used for all labels/rules (unless per-rule prompt override is set below):
    default_prompt_template: |
      You are verifying annotation quality for label '{label}' and rule '{rule}'.
      The image shows a crop that may contain multiple objects. The annotation being
      evaluated is drawn directly on the image — focus ONLY on the marked annotation.
      {annotation_fields_json}
      Return ONLY strict JSON, with no markdown and no prose:
      {"error_probability": <float between 0 and 1>, "reason": "<brief reason>"}

    labels:
      # VLM RULES (available rules for all labels):
      #   bbox_localization  — is the bounding box tightly localizing the object?
      #   bbox_coverage      — does the bbox cover the full object without major clipping?
      #   clamp_type         — is the labeled clamp type (2-arm / 3-arm) visually correct?
      #   roll_count         — does the roll count attribute match what is visible?
      #   keypoint_position  — are keypoints placed correctly on the object?
      #   occlusion_state    — do visibility codes correctly reflect occlusion?
      #
      # Rule selection by annotation type:
      #   bbox labels (forklift-*): bbox_localization, bbox_coverage, attribute rules
      #   skeleton labels (clamp-*-arm, roll-keypoints): keypoint_position, occlusion_state
      #     → bbox_localization/bbox_coverage are NOT used for skeletons because the bbox
      #       is auto-derived from keypoint coordinates — there is no manually-placed bbox
      #       to evaluate for localization or coverage quality.
      #   mask/polygon labels (clamp-mask, roll-mask): no applicable rules currently;
      #     the 6 VLM rules require either a manually-placed bbox or keypoints.
      #
      # Add one block per label that should be VLM-checked.
      # Only deterministic-PASS objects for enabled labels reach the VLM stage.
      forklift-with-roll:
        enabled: true
        # bbox type: manually-placed bbox + clamp-type + roll-count attributes
        rules: ["bbox_localization", "bbox_coverage", "clamp_type", "roll_count"]
        # Per-rule prompt overrides — use {label}, {rule}, {annotation_fields_json}.
        prompts:
          bbox_localization: |
            You are validating label '{label}' for rule '{rule}'.
            The image shows a crop that may contain multiple objects.
            An orange-red rectangle marks the bounding box being evaluated — focus ONLY on that object.
            Judge whether the bounding box tightly localizes the intended object.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          bbox_coverage: |
            You are validating label '{label}' for rule '{rule}'.
            The image shows a crop that may contain multiple objects.
            An orange-red rectangle marks the bounding box being evaluated — focus ONLY on that object.
            Judge whether the bbox covers the full object without major clipping or excess background.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          clamp_type: |
            You are validating label '{label}' for rule '{rule}'.
            Annotation fields:
            {annotation_fields_json}
            Judge whether the clamp-type attribute value matches the clamp visually present in the crop.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          roll_count: |
            You are validating label '{label}' for rule '{rule}'.
            Annotation fields:
            {annotation_fields_json}
            Judge whether the roll-count attribute matches the number of rolls visible in the crop.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
        # Per-label thresholds (optional — inherits global when absent):
        # thresholds:
        #   pass_below: 0.15
        #   review_below: 0.50
      forklift-no-roll:
        enabled: true
        # bbox type: manually-placed bbox only (no roll/clamp attributes to validate)
        rules: ["bbox_localization", "bbox_coverage"]
        prompts:
          bbox_localization: |
            You are validating label '{label}' for rule '{rule}'.
            The image shows a crop that may contain multiple objects.
            An orange-red rectangle marks the bounding box being evaluated — focus ONLY on that object.
            Judge whether the bounding box tightly localizes the intended object.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          bbox_coverage: |
            You are validating label '{label}' for rule '{rule}'.
            The image shows a crop that may contain multiple objects.
            An orange-red rectangle marks the bounding box being evaluated — focus ONLY on that object.
            Judge whether the bbox covers the full object without major clipping or excess background.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
      clamp-2-arm:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot colors: green = fully visible, orange = occluded, gray = unlabeled.
            Judge whether keypoints are placed correctly on expected clamp landmarks.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          occlusion_state: |
            You are verifying the occlusion annotation for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot color meaning:
              green  = this part of the '{label}' structure is directly visible in the image
              orange = this part of the '{label}' structure is hidden behind another object (e.g. a roll); the dot marks where that surface is, even though it is blocked
              gray   = this keypoint is unlabeled
            Important: an orange dot whose position falls on or overlaps a roll or another object is CORRECT — it marks a hidden surface of the '{label}'.
            Judge whether each dot color matches the actual visibility of the '{label}' structure at that position.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
      clamp-3-arm:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot colors: green = fully visible, orange = occluded, gray = unlabeled.
            Judge whether keypoints are placed correctly on expected clamp landmarks.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          occlusion_state: |
            You are verifying the occlusion annotation for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot color meaning:
              green  = this part of the '{label}' structure is directly visible in the image
              orange = this part of the '{label}' structure is hidden behind another object (e.g. a roll); the dot marks where that surface is, even though it is blocked
              gray   = this keypoint is unlabeled
            Important: an orange dot whose position falls on or overlaps a roll or another object is CORRECT — it marks a hidden surface of the '{label}'.
            Judge whether each dot color matches the actual visibility of the '{label}' structure at that position.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
      roll-keypoints:
        enabled: true
        # skeleton type: bbox is auto-derived from keypoints — skip bbox rules.
        rules: ["keypoint_position", "occlusion_state"]
        prompts:
          keypoint_position: |
            You are verifying keypoint placement for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot colors: green = fully visible, orange = occluded, gray = unlabeled.
            Judge whether roll keypoints are placed correctly on expected landmarks.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
          occlusion_state: |
            You are verifying the occlusion annotation for the '{label}' object (rule: '{rule}').
            The image shows a crop that may contain multiple objects.
            Colored dots mark structural keypoints on the '{label}' object — focus ONLY on those dots, not on any text, stickers, or labels visible in the scene.
            Dot color meaning:
              green  = this part of the '{label}' structure is directly visible in the image
              orange = this part of the '{label}' structure is hidden behind another object; the dot marks where that surface is, even though it is blocked
              gray   = this keypoint is unlabeled
            Important: an orange dot whose position falls on or overlaps another object is CORRECT — it marks a hidden surface of the '{label}'.
            Judge whether each dot color matches the actual visibility of the '{label}' structure at that position.
            Return ONLY JSON:
            {"error_probability": <float 0..1>, "reason": "<brief reason>"}
      # mask/polygon labels — none of the 6 VLM rules apply (no manually-placed bbox,
      # no keypoints, no relevant attributes in the annotation payload).
      clamp-mask:
        enabled: false
      roll-mask:
        enabled: false

